# =============================================================================
#  /etc/chrony.conf
#  Enterprise time-synchronisation policy — NTS-only, non-smearing.
#  Managed primary config (chronyd reads this path by default).
#  Daemon command-line flags (e.g. -s) live in /etc/sysconfig/chronyd.
# =============================================================================

# --- Time sources: NTS-only, non-smearing, four INDEPENDENT operators --------
# Falseticker rejection (RFC 5905 selection algorithm) needs multiple
# independent operators, not multiple addresses of one. Hostnames are used
# deliberately so AAAA records are picked up when IPv6 is present
# (see /etc/sysconfig/chronyd: no -4 flag).
#   iburst : fast initial convergence (RFC 5905 §11)
#   nts    : transport authentication via NTS-KE/TLS (RFC 8915)
server time.cloudflare.com iburst nts   # Anycast, lowest latency (PoPs in IN); stratum 3; non-smearing
server ntpmon.dcs1.biz     iburst nts   # Singapore — nearest independent NTS to IN; stratum 3
server nts.netnod.se       iburst nts   # Netnod (SE) anycast stratum-1 — independent national-grade anchor
server ptbtime1.ptb.de     iburst nts   # PTB (DE national metrology) stratum-1 — second independent anchor

# --- NTS enforced system-wide ------------------------------------------------
# Unauthenticated sources (incl. anything injected via DHCP) may be measured
# but NEVER selected to set the clock. chrony.conf(5) §authselectmode.
authselectmode require

# --- Quorum / falseticker floor ----------------------------------------------
# Require >=2 agreeing sources before disciplining the clock.
# Raise to 3 for a stricter quorum at the cost of availability.
minsources 2

# --- Cold-boot NTS bootstrap (last-resort cert time-check bypass) ------------
# Permits NTS-KE before the clock is correct (dead/incorrect RTC). This covers
# chrony's OWN NTS-KE TLS check only — the system clock is floored before any
# DNS/DoT by 'chronyd -s'. chrony.conf(5) §nocerttimecheck.
nocerttimecheck 1

# --- Leap seconds: STEP, never smear -----------------------------------------
# Authoritative IERS/IETF leap schedule. leapsecmode left at default (kernel
# step); 'leapsecmode slew' (smearing) is intentionally NOT set, and all four
# sources are non-smearing (RFC 8633 §4.3) so they stay consistent at a leap.
leapseclist /usr/share/zoneinfo/leap-seconds.list

# --- NTS cookie persistence (also softens cold boot) -------------------------
# Persist cookies/keys across restarts: avoids a fresh NTS-KE every boot and
# lets cached cookies drive authenticated NTP before the next KE. RFC 8915.
ntsdumpdir /var/lib/chrony

# --- Clock control / housekeeping --------------------------------------------
makestep 1.0 3                    # step (not slew) if off >1 s during first 3 updates
driftfile /var/lib/chrony/drift   # also the timestamp 'chronyd -s' uses as the cold-boot clock floor
rtcsync                           # periodically copy system time to the RTC
logdir /var/log/chrony

# NOTE: 'sourcedir /run/chrony-dhcp' is intentionally absent — DHCP NTP
# injection is blocked here (authselectmode require) and at NetworkManager.
