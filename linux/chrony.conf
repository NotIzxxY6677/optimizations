# chrony.conf(5): chronyd(8) configuration.

# chrony.conf(5) §pool: Commented; superseded by §server below.
#pool 2.fedora.pool.ntp.org iburst

# chrony.conf(5) §server: Unicast NTP source; iburst accelerates initial convergence (RFC 5905 §11).
# time.cloudflare.com: no leap-second smearing applied (RFC 8633 §4.3).
# NOTE: sourcedir below may supplement with DHCP-provided sources; absent DHCP NTP,
# single static source bypasses falseticker detection; chrony.conf(5) recommends ≥3 selectable sources.
server time.cloudflare.com iburst nts

# chrony.conf(5) §sourcedir: Loads source definitions from directory at runtime.
# /run/chrony-dhcp: populated by NetworkManager with NTP servers from DHCPv4 option 42 (RFC 2132 §8.3).
sourcedir /run/chrony-dhcp

# chrony.conf(5) §driftfile: Persistent store for system clock frequency error (ppm).
driftfile /var/lib/chrony/drift

# chrony.conf(5) §makestep: Permits clock step on first 3 updates if offset exceeds 1.0s;
# subsequent corrections via slewing only. cf. adjtime(3).
makestep 1.0 3

# chrony.conf(5) §rtcsync: Enables periodic kernel RTC update. adjtimex(2).
rtcsync

# chrony.conf(5) §hwtimestamp: Hardware timestamping on matching interface(s). SO_TIMESTAMPING(7).
#hwtimestamp *

# chrony.conf(5) §minsources: Minimum selectable sources required before adjusting system clock.
#minsources 2

# chrony.conf(5) §allow: NTP client access ACL. RFC 5905 §7.2.
#allow 192.168.0.0/16

# chrony.conf(5) §local: Serves time at stratum 10 regardless of synchronisation state.
#local stratum 10

# chrony.conf(5) §authselectmode: require enforces NTS or symmetric-key auth on all sources.
#authselectmode require

# chrony.conf(5) §keyfile: Symmetric key file for NTP authentication. chrony.keys(5).
#keyfile /etc/chrony.keys

# chrony.conf(5) §ntsdumpdir: Persistent store for NTS session keys and cookies. RFC 8915 §5.
ntsdumpdir /var/lib/chrony

# chrony.conf(5) §leapsecmode: slew distributes leap-second correction over ~1000s. RFC 5905 §16.
#leapsecmode slew

# chrony.conf(5) §leapseclist: IANA leap-seconds list; drives TAI-UTC offset tracking.
leapseclist /usr/share/zoneinfo/leap-seconds.list

# chrony.conf(5) §logdir: Log file output directory.
logdir /var/log/chrony

# chrony.conf(5) §log: Selects logged data classes. See chrony.conf(5) §log for class definitions.
#log measurements statistics tracking
