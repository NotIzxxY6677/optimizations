# sysctl.d(5); applied by systemd-sysctl(8). Ref: Documentation/networking/{net_sysctl,ip-sysctl}.rst

# net.core.default_qdisc: Default queuing discipline (fq); required for BBR pacing. tc-fq(8).
net.core.default_qdisc = fq

# net.ipv4.tcp_congestion_control: TCP congestion control algorithm (BBR). tcp(7); req: linux ≥4.9, CONFIG_TCP_CONG_BBR=y/m.
net.ipv4.tcp_congestion_control = bbr
