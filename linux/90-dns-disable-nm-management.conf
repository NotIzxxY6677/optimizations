# =============================================================================
#  90-dns-disable-nm-management.conf
#  Removes NetworkManager from the DNS path so a single static encrypted
#  systemd-resolved policy is authoritative and DHCP-supplied resolvers can
#  never be injected. NetworkManager.conf(5) §[main].
# =============================================================================
[main]

# Do not write /etc/resolv.conf and do not propagate DHCP-supplied DNS
# (DHCPv4 opt.6 / DHCPv6 opt.23 RFC 3646 / RA RDNSS RFC 8106).
# /etc/resolv.conf is symlinked to /run/systemd/resolve/stub-resolv.conf
# (127.0.0.53), so applications still resolve via systemd-resolved.
dns=none

# Disable the NM<->systemd-resolved D-Bus integration so NM cannot push
# per-link DHCP DNS into resolved out-of-band (which would bypass the global
# policy in resolved.conf.d/). Does NOT hide resolved from the WARP client,
# which registers with resolved on its own when connected.
systemd-resolved=false
