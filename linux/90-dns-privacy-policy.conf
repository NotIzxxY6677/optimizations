# path: /etc/systemd/resolved.conf.d/90-dns-privacy-policy.conf

[Resolve]
# resolved.conf(5) §DNS=: Space-separated list; addr#name SNI format required by DNSOverTLS= (RFC 7858 §3.1).
DNS=1.1.1.1#one.one.one.one 1.0.0.1#one.one.one.one 9.9.9.10#dns10.quad9.net 149.112.112.10#dns10.quad9.net 8.8.8.8#dns.google 8.8.4.4#dns.google 2606:4700:4700::1111#one.one.one.one 2606:4700:4700::1001#one.one.one.one 2620:fe::10#dns10.quad9.net 2620:fe::fe:10#dns10.quad9.net 2001:4860:4860::8888#dns.google 2001:4860:4860::8844#dns.google

# DNS-over-TLS enforcement; rejects plaintext upstream connections. RFC 7858.
DNSOverTLS=yes

# resolved.conf(5) §FallbackDNS=: Empty; suppresses compiled-in distribution defaults to enforce hard failure over plaintext fallback.
FallbackDNS=

# Catch-all routing domain; routes all queries through global DNS= above. resolved.conf(5) §Domains=.
Domains=~.

# LLMNR: Querier and responder disabled system-wide. RFC 4795.
LLMNR=no

# mDNS: Querier and responder disabled system-wide. RFC 6762.
MulticastDNS=no

# DNSSEC: Local validation disabled; delegated to upstream resolver.
DNSSEC=no
