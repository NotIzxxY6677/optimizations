# NetworkManager.conf(5) §[connection]: Global connection-profile defaults. nm-settings(5).
[connection]

# ipv4.ignore-auto-dns: Discard DHCPv4 DNS (RFC 2132 opt.6).
ipv4.ignore-auto-dns=yes

# ipv6.ignore-auto-dns: Discard DHCPv6 DNS (RFC 3646 opt.23) and RA RDNSS (RFC 8106 §3.1).
ipv6.ignore-auto-dns=yes
