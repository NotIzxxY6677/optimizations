# =============================================================================
#  90-dns-dot-strict-policy.conf
#  Strict (fail-closed) DNS-over-TLS, multi-provider, system-wide.
#  resolved.conf(5) §[Resolve].
# =============================================================================
[Resolve]

# Upstream resolvers as addr#SNI tuples (SNI name REQUIRED for DoT cert
# verification, RFC 7858 §3.1). Multiple independent providers for resilience;
# v4 and v6 both listed (v6 used when reachable).
DNS=1.1.1.1#one.one.one.one 1.0.0.1#one.one.one.one 9.9.9.10#dns10.quad9.net 149.112.112.10#dns10.quad9.net 8.8.8.8#dns.google 8.8.4.4#dns.google 2606:4700:4700::1111#one.one.one.one 2606:4700:4700::1001#one.one.one.one 2620:fe::10#dns10.quad9.net 2620:fe::fe:10#dns10.quad9.net 2001:4860:4860::8888#dns.google 2001:4860:4860::8844#dns.google

# Strict mode: require DoT, fail closed if TLS cannot be established — no
# silent downgrade to plaintext :53.
DNSOverTLS=yes

# Suppress the compiled-in fallback list so there is no plaintext escape hatch
# if every DoT server is unreachable.
FallbackDNS=

# Catch-all routing domain: send every query to the DNS= servers above.
Domains=~.

# Disable local multicast name resolution (attack-surface reduction).
# Trade-off: .local / LAN service discovery will not resolve.
LLMNR=no                # RFC 4795
MulticastDNS=no         # RFC 6762

# Local DNSSEC validation OFF — deliberate, and important for cold boot:
# DNSSEC adds a second time-dependent check (signature validity windows) that
# would FAIL on a wrong clock and compound the DNS<->time deadlock. The DoT
# channel above still authenticates transport; validation is delegated upstream.
DNSSEC=no
