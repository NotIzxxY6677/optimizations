# NetworkManager.conf(5) §[main]: Global NetworkManager daemon settings.
[main]

# NetworkManager.conf(5) §dns=: DNS processing mode.
# 'none': NM does not modify /etc/resolv.conf; DHCP-supplied DNS (RFC 2132 opt.6, RFC 3646 opt.23, RFC 8106 §3.1) not propagated.
dns=none

# NetworkManager.conf(5) §systemd-resolved=: Disables NM D-Bus integration with systemd-resolved(8);
# prevents per-link DHCP DNS injection into resolved, which would otherwise bypass global policy in resolved.conf.d/.
systemd-resolved=false
