# =============================================================================
#  99-net-tcp-bbr-fq.conf
#  TCP BBR congestion control with fair-queue pacing.
#  Applied by systemd-sysctl(8). Refs: Documentation/networking/ip-sysctl.rst,
#  tcp(7), tc-fq(8).
# =============================================================================

# Default egress qdisc = fq, providing the packet pacing BBR relies on.
net.core.default_qdisc = fq

# Congestion control = BBR (mainline implements BBRv1; v2/v3 are out-of-tree).
# Requires Linux >= 4.9 with CONFIG_TCP_CONG_BBR=y/m (stock Fedora kernel OK).
# Governs TCP only — WARP's MASQUE tunnel is QUIC/UDP with its own congestion
# control, so this setting is orthogonal to the VPN.
net.ipv4.tcp_congestion_control = bbr
